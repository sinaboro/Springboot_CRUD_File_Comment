spring:
  datasource:
    url: jdbc:mysql://localhost:3306/memberdb?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
    username: test
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

file:
  upload-dir: c:/uploads/

server:
  port: 8080
