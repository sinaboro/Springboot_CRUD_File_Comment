<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/board/list">게시판</a>
    </div>
</nav>
<div class="container"><div class="row justify-content-center"><div class="col-md-9">
    <div class="card shadow-sm">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0"><i class="bi bi-pencil-square"></i> 게시글 수정</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/board/edit/{id}(id=${board.id})}" th:object="${boardDto}"
                  method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-semibold">제목</label>
                    <input type="text" th:field="*{title}" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">내용</label>
                    <textarea th:field="*{content}" class="form-control" rows="12"
                              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:errors="*{content}"></div>
                </div>
                <!-- 기존 첨부파일 목록 + 삭제 버튼 -->
                <div class="mb-3" th:if="${!board.files.isEmpty()}">
                    <label class="form-label fw-semibold">기존 첨부파일</label>
                    <ul class="list-group">
                        <li class="list-group-item d-flex justify-content-between"
                            th:each="file : ${board.files}">
                            <span th:text="${file.originalName}"></span>
                            <!-- 파일 삭제 링크: boardId를 파라미터로 전달해 수정 화면으로 돌아옴 -->
                            <a th:href="@{/files/delete/{fileId}(fileId=${file.id}, boardId=${board.id})}"
                               onclick="return confirm('파일을 삭제하시겠습니까?')"
                               class="btn btn-outline-danger btn-sm">삭제</a>
                        </li>
                    </ul>
                </div>
                <!-- 파일 추가 업로드 -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">파일 추가</label>
                    <input type="file" name="files" class="form-control" multiple>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">수정 저장</button>
                    <a th:href="@{/board/view/{id}(id=${board.id})}"
                       class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div></div></div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
