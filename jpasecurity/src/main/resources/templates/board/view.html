<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
    <style>
        .content-area { min-height: 200px; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/board/list">게시판</a>
        <span class="text-white"><span sec:authentication="principal.username" /> 님</span>
    </div>
</nav>

<div class="container">
    <!-- 권한 오류 메시지 -->
    <div th:if="${param.error != null and param.error[0] == 'forbidden'}" class="alert alert-danger">
        본인이 작성한 글/댓글만 수정·삭제할 수 있습니다.
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <!-- 게시글 본문 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">
            <h4 class="mb-1" th:text="${board.title}"></h4>
            <small class="text-muted">
                작성자: <strong th:text="${board.member.name}"></strong>
                &nbsp;|&nbsp; 조회: <span th:text="${board.viewCount}"></span>
                &nbsp;|&nbsp; 등록일: <span th:text="${#temporals.format(board.createdAt,'yyyy-MM-dd HH:mm')}"></span>
            </small>
        </div>
        <div class="card-body">
            <!-- pre-wrap: 줄바꿈·공백 유지 -->
            <div class="content-area" th:text="${board.content}"></div>
        </div>
        <div class="card-footer d-flex justify-content-between">
            <a href="/board/list" class="btn btn-outline-secondary btn-sm">목록</a>
            <!-- ★ 본인 글에만 수정·삭제 버튼 표시 -->
            <div th:if="${board.member.id == loginUser.id}">
                <a th:href="@{/board/edit/{id}(id=${board.id})}"
                   class="btn btn-warning btn-sm me-1">수정</a>
                <a th:href="@{/board/delete/{id}(id=${board.id})}"
                   onclick="return confirm('삭제하시겠습니까?')"
                   class="btn btn-danger btn-sm">삭제</a>
            </div>
        </div>
    </div>

    <!-- 첨부파일 목록 -->
    <div class="card shadow-sm mb-4" th:if="${!files.isEmpty()}">
        <div class="card-header">
            <i class="bi bi-paperclip"></i> 첨부파일
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="file : ${files}">
                <a th:href="@{/files/download/{id}(id=${file.id})}"
                   th:text="${file.originalName}" class="text-decoration-none">
                </a>
                <span class="text-muted small"
                      th:text="${#numbers.formatInteger(file.fileSize/1024, 1, 'COMMA') + ' KB'}">
                </span>
            </li>
        </ul>
    </div>


    <!-- 댓글 목록 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">
            <i class="bi bi-chat-dots"></i>
            댓글 <span class="badge bg-primary" th:text="${comments.size()}"></span>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:if="${comments.isEmpty()}">
                <span class="text-muted">첫 번째 댓글을 남겨보세요.</span>
            </li>
            <li class="list-group-item" th:each="comment : ${comments}">
                <div class="d-flex justify-content-between">
                    <div>
                        <strong th:text="${comment.member.name}"></strong>
                        <span class="text-muted small ms-2"
                              th:text="${#temporals.format(comment.createdAt,'yyyy-MM-dd HH:mm')}">
                        </span>
                        <p class="mb-0 mt-1" th:text="${comment.content}"></p>
                    </div>

                    <a th:if="${comment.member.id == loginUser.id}"
                       th:href="@{/board/comment/delete/{id}(id=${comment.id})}"
                       onclick="return confirm('댓글을 삭제하시겠습니까?')"
                       class="btn btn-outline-danger btn-sm align-self-start">삭제</a>
                </div>
            </li>
        </ul>

        <div class="card-footer">
            <form th:action="@{/board/comment/{id}(id=${board.id})}" method="post">
                <div class="input-group">
                    <input type="text" name="content" class="form-control"
                           placeholder="댓글을 입력하세요" required>
                    <button type="submit" class="btn btn-primary">등록</button>
                </div>
            </form>
        </div>
    </div>

</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
