<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><title>게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table thead th { background-color: #0D47A1; color: white; }
    </style>
</head>
<body>

<!-- 네비게이션 바 -->
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/board/list">
            <i class="bi bi-journal-text"></i> JpaSecurity 게시판
        </a>
        <div class="d-flex align-items-center gap-3">
 <span class="text-white">
 <i class="bi bi-person-circle"></i>
 <!-- <sec:authentication property="name"/> 님 -->
 <span sec:authentication="principal.username"></span> 님
 </span>
            <a href="/member/list" class="btn btn-outline-light btn-sm">회원관리</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <!-- 검색 폼 -->
    <form th:action="@{/board/list}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control"
                   placeholder="제목 또는 내용 검색" th:value="${keyword}">
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-search"></i> 검색
            </button>
            <a href="/board/list" class="btn btn-outline-secondary">초기화</a>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <!-- 전체 게시글 수 표시 -->
        <span class="text-muted"> 전체 <strong th:text="${boardPage.totalElements}"></strong>건 </span>
        <a href="/board/write" class="btn btn-primary btn-sm">
            <i class="bi bi-pencil-square"></i> 글쓰기
        </a>
    </div>

    <!-- 게시글 목록 테이블 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead>
                    <tr>
                        <th style="width:70px">번호</th>
                        <th>제목</th>
                        <th style="width:110px">작성자</th>
                        <th style="width:80px" class="text-center">조회</th>
                        <th style="width:120px">등록일</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${boardPage.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">게시글이 없습니다.</td>
                    </tr>

                    <tr th:each="board, boardStat : ${boardPage.content}">

                        <!-- 게시글 번호: 전체 건수 - (현재페이지 * 페이지사이즈) - 순서 -->
                        <td th:text="${boardPage.totalElements - (boardPage.number * boardPage.size) - boardStat.index}"></td>

                        <td>
                            <a th:href="@{/board/view/{id}(id=${board.id})}"
                               th:text="${board.title}" class="text-decoration-none fw-semibold"></a>
                            <!-- 댓글 수 표시 -->
                            <span th:if="${!board.comments.isEmpty()}"
                                  class="badge bg-secondary ms-1"
                                  th:text="'[' + ${board.comments.size()} + ']'"></span>
                        </td>
                        <td th:text="${board.member.name}"></td>
                        <td class="text-center" th:text="${board.viewCount}"></td>
                        <!-- 날짜 포맷: LocalDateTime → 'yyyy-MM-dd' 형식으로 표시 -->
                       <!-- <td th:text="${board.createdAt}"></td> -->
                        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <!-- ★ 번호 페이징 -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">
            <!-- 이전 그룹 버튼 (startPage > 0 일 때만 표시) -->
            <li class="page-item" th:if="${startPage > 0}">
                <a class="page-link" th:href="@{/board/list(page=${startPage - 1},keyword=${keyword})}">
                    &lt;&lt; 이전
                </a>
            </li>

            <!-- 페이지 번호 버튼 (startPage ~ endPage) -->
            <!-- #numbers.sequence(start, end): start부터 end까지 숫자 배열 생성 -->
            <li class="page-item"
                th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${pageNum == currentPage} ? 'active'">
                <!-- page 파라미터: 0부터 시작, keyword 파라미터 유지 -->
                <a class="page-link"
                   th:href="@{/board/list(page=${pageNum}, keyword=${keyword})}"
                   th:text="${pageNum + 1}"></a>
            </li>

            <!-- 다음 그룹 버튼 (endPage < totalPages-1 일 때만 표시) -->
            <li class="page-item" th:if="${endPage < totalPages - 1}">
                <a class="page-link" th:href="@{/board/list(page=${endPage + 1}, keyword=${keyword})}">
                    다음 &gt;&gt;
                </a>
            </li>
        </ul>
    </nav>

</div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
