<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><title>글쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/board/list">게시판</a>
        <span class="text-white"> <span sec:authentication="principal.username"></span>님 </span>
    </div>
</nav>

<div class="container"><div class="row justify-content-center"><div class="col-md-9">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-pencil-square"></i> 글쓰기</h5>
        </div>
        <div class="card-body">
            <!-- ★ enctype='multipart/form-data': 파일 업로드를 위해 반드시 설정 -->
            <form th:action="@{/board/write}" th:object="${boardDto}" method="post"
                  enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-semibold">제목 <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{title}" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="제목을 입력하세요">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">내용 <span class="text-danger">*</span></label>
                    <textarea th:field="*{content}" class="form-control" rows="12"
                              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
                              placeholder="내용을 입력하세요"></textarea>
                    <div class="invalid-feedback" th:errors="*{content}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">파일 첨부</label>
                    <!-- multiple: 여러 파일 동시 선택 가능 -->
                    <!-- name='files': BoardDto의 files 필드와 매핑 -->
                    <input type="file" name="files" class="form-control" multiple>
                    <div class="form-text">여러 파일 동시 선택 가능 (최대 10MB/개)</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> 등록
                    </button>
                    <a href="/board/list" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</div></div></div>
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
