<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container"><div class="row justify-content-center mt-5"><div class="col-md-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3 text-center">회원가입</h4>
            <form th:action="@{/auth/register}" th:object="${registerDto}" method="post">
                <div class="mb-3">
                    <label class="form-label">이름</label>
                    <input type="text" th:field="*{name}" class="form-control">
                    <div class="invalid-feedback d-block text-danger" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" th:field="*{username}" class="form-control">
                    <div class="invalid-feedback d-block text-danger"
                         th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" th:field="*{password}" class="form-control">
                    <div class="invalid-feedback d-block text-danger"
                         th:errors="*{password}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">가입하기</button>
            </form>
        </div>
    </div>
</div></div></div>
</body></html>
