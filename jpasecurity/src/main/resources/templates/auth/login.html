<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container"><div class="row justify-content-center mt-5"><div class="col-md-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3 text-center">로그인</h4>
            <div th:if="${param.error}" class="alert alert-danger">아이디 또는 비밀번호가 올바르지 않
                습니다.</div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <!-- th:action: SecurityConfig의 loginProcessingUrl과 동일해야 함 -->
            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
                <a href="/auth/register" class="btn btn-outline-secondary w-100 mt-2">회원가입
                </a>
            </form>
        </div>
    </div>
</div></div></div>
</body></html>
